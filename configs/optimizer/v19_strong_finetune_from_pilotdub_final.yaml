# @package __global__

optimizer:
  _target_: torch.optim.AdamW
  lr: 2e-6
  betas: [0.9, 0.95]
  weight_decay: 0.01
  param_groups:
    - name: v19_strong_new_decoder_layers
      lr: 1e-5
      include:
        - "model.decoder.layers.8."
        - "model.decoder.layers.9."
        - "model.decoder.layers.10."
        - "model.decoder.layers.11."
        - "model.decoder.layers.12."
        - "model.decoder.layers.13."
        - "model.decoder.layers.14."
        - "model.decoder.layers.15."
    - name: v19_strong_plan_encoder
      lr: 5e-5
      include:
        - "model.plan_encoder"
    - name: v19_strong_plan_heads
      lr: 5e-5
      weight_decay: 0.0
      include:
        - "model.plan_progress_head"
        - "model.plan_boundary_head"
        - "model.plan_acoustic_head"
    - name: v19_strong_in_decoder_cross_attn_gate
      lr: 5e-5
      weight_decay: 0.0
      include:
        - "model.in_decoder_cross_attention_layers"
        - ".gate"
    - name: v19_strong_in_decoder_cross_attn
      lr: 1.5e-5
      include:
        - "model.in_decoder_cross_attention_layers"
      exclude:
        - ".gate"
